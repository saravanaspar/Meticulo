# .github/workflows/release.yml

name: Release Pipeline

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-package:
    name: Build ${{ matrix.job_name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux 64-bit
          - job_name: Linux x64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive_name: meticulo-linux-amd64
            use_cross: false
            ext: tar.gz
            
          # Linux 32-bit
          - job_name: Linux x86 (32-bit)
            os: ubuntu-latest
            target: i686-unknown-linux-gnu
            archive_name: meticulo-linux-x86
            use_cross: true
            ext: tar.gz

          # Raspberry Pi 4/5 (ARM64)
          - job_name: Linux ARM64
            os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            archive_name: meticulo-linux-arm64
            use_cross: true
            ext: tar.gz

          # Raspberry Pi 2/3 (ARMv7 32-bit)
          - job_name: Linux ARMv7
            os: ubuntu-latest
            target: armv7-unknown-linux-gnueabihf
            archive_name: meticulo-linux-armv7
            use_cross: true
            ext: tar.gz

          # Windows 64-bit
          - job_name: Windows x64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            archive_name: meticulo-windows-amd64
            use_cross: false
            ext: zip

          # Windows 32-bit
          - job_name: Windows x86 (32-bit)
            os: windows-latest
            target: i686-pc-windows-msvc
            archive_name: meticulo-windows-x86
            use_cross: false
            ext: zip

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Cross
        if: matrix.use_cross == true
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build TUI (Native)
        if: matrix.use_cross == false
        run: cargo build --release --manifest-path tui/Cargo.toml --target ${{ matrix.target }}

      - name: Build TUI (Cross-compiled)
        if: matrix.use_cross == true
        run: cross build --release --manifest-path tui/Cargo.toml --target ${{ matrix.target }}

      - name: Package Release (Linux / ARM)
        if: runner.os == 'Linux'
        run: |
          mkdir -p staging/${{ matrix.archive_name }}
          
          # Bundle the Python package and installation scripts
          cp -r meticulo staging/${{ matrix.archive_name }}/
          cp pyproject.toml README.md LICENSE install.sh meticulo.sh staging/${{ matrix.archive_name }}/
          
          # Bundle the compiled Rust TUI binary
          cp tui/target/${{ matrix.target }}/release/meticulo-tui staging/${{ matrix.archive_name }}/
          
          # Compress to standard tarball
          cd staging
          tar -czvf ../${{ matrix.archive_name }}.tar.gz ${{ matrix.archive_name }}

      - name: Package Release (Windows)
        if: runner.os == 'Windows'
        run: |
          New-Item -ItemType Directory -Force -Path "staging\${{ matrix.archive_name }}"
          
          # Bundle the Python package and installation scripts
          Copy-Item -Path "meticulo" -Destination "staging\${{ matrix.archive_name }}\meticulo" -Recurse
          Copy-Item -Path "pyproject.toml", "README.md", "LICENSE", "install.sh", "meticulo.sh" -Destination "staging\${{ matrix.archive_name }}\"
          
          # Bundle the compiled Rust TUI binary
          Copy-Item -Path "tui\target\${{ matrix.target }}\release\meticulo-tui.exe" -Destination "staging\${{ matrix.archive_name }}\"
          
          # Compress to standard ZIP archive
          Compress-Archive -Path "staging\${{ matrix.archive_name }}\*" -DestinationPath "${{ matrix.archive_name }}.zip"

      - name: Upload Artifact to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.archive_name }}.${{ matrix.ext }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}